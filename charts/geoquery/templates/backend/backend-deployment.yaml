apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoquery-backend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: geoquery-backend
  template:
    metadata:
      labels:
        app: geoquery-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: django
          image: {{ .Values.backend.image }}
          command: ["/app/.venv/bin/uvicorn", "geoquery.asgi:application", "--host", "0.0.0.0", "--port", "8000"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DJANGO_TIME_ZONE
              value: {{ .Values.django.timeZone }}
            - name: DJANGO_SECRET_KEY
              value: {{ .Values.django.secretKey }}
            - name: DJANGO_ALLOWED_HOSTS
              value: {{ .Values.django.allowedHosts }}
            - name: DJANGO_DEBUG
              value: "{{ .Values.django.debug }}"
            {{- if .Values.django.csrfTrustedOrigins }}
            - name: DJANGO_CSRF_TRUSTED_ORIGINS
              value: {{ .Values.django.csrfTrustedOrigins | quote }}
            {{- end }}
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: host
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: dbname
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: password
            - name: PROTOMAPS_API_KEY
              value: {{.Values.protomaps.key }}
            - name: RABBITMQ_HOST
              value: "geoquery-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-rabbitmq-default-user
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-rabbitmq-default-user
                  key: password
            - name: CELERY_BROKER_URL
              value: "amqp://$(RABBITMQ_USERNAME):$(RABBITMQ_PASSWORD)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)//"
            {{- if .Values.metrics.enabled }}
            - name: PROMETHEUS_ENABLED
              value: "true"
            {{- end }}
          resources:
            requests:
              memory: "3500Mi"
              cpu: "500m"
            limits:
              memory: "4000Mi"
              cpu: "2000m"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 9090
      volumes:
        - name: tmp
          emptyDir: {}
