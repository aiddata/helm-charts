apiVersion: v1
kind: Service
metadata:
  name: geoquery-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: geoquery
spec:
  type: ClusterIP
  selector:
    app: geoquery-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
    - name: metrics
      port: 9090
      targetPort: 9090
