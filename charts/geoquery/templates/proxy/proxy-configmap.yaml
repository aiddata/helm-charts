{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: geoquery-proxy-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: geoquery-proxy
data:
  nginx.conf: |
    # Reverse proxy fronting the GeoQuery app. It is the single entry point
    # for external traffic and routes each request to either the frontend
    # (UI) or the backend (API/admin) service based on the request path.
    worker_processes auto;
    pid /tmp/nginx.pid;
    error_log /dev/stderr warn;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;
      access_log /dev/stdout;

      # readOnlyRootFilesystem: keep all writable scratch under the /tmp emptyDir
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path       /tmp/proxy_temp;
      fastcgi_temp_path     /tmp/fastcgi_temp;
      uwsgi_temp_path       /tmp/uwsgi_temp;
      scgi_temp_path        /tmp/scgi_temp;

      sendfile on;
      tcp_nopush on;
      keepalive_timeout 65;
      server_tokens off;

      # Allow large query-result uploads/downloads to stream through.
      client_max_body_size {{ .Values.proxy.maxBodySize }};

      # Preserve the original request scheme across proxy hops. If an upstream
      # proxy (e.g. ingress controller / Cloudflare Tunnel) already set
      # X-Forwarded-Proto, keep it so Django still sees the request as HTTPS;
      # otherwise fall back to this hop's scheme.
      map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
      }

      # WebSocket support: only send the Upgrade/Connection headers when the
      # client actually requested an upgrade.
      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      upstream frontend {
        server geoquery.{{ .Release.Namespace }}.svc.cluster.local:80;
      }
      upstream backend {
        server geoquery-backend.{{ .Release.Namespace }}.svc.cluster.local:80;
      }

      # Preserve the original host and client info so Django can validate
      # CSRF/Host and build correct absolute URLs behind the proxy.
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;

      server {
        listen {{ .Values.proxy.containerPort }};
        server_name _;

        # Local liveness/readiness endpoint served by nginx itself (never
        # proxied), so proxy health is independent of the upstreams.
        location = /healthz {
          access_log off;
          add_header Content-Type text/plain;
          return 200 "ok\n";
        }

        # Backend-routed path prefixes (API, admin, and anything else the
        # backend owns). Everything not listed here falls through to the
        # frontend.
        {{- range .Values.proxy.backendPaths }}
        location {{ . }} {
          proxy_pass http://backend;
        }
        {{- end }}

        # Everything else is served by the frontend UI.
        location / {
          proxy_pass http://frontend;
        }
      }
    }
{{- end }}
