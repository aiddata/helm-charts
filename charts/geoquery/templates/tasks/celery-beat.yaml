{{- if .Values.tasks.beat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: geoquery-celery-beat
  template:
    metadata:
      labels:
        app: geoquery-celery-beat
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: celery-beat
          image: {{ .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["/app/.venv/bin/celery"]
          args:
            - "-A"
            - "geoquery"
            - "beat"
            - "--loglevel=info"
            - "--schedule=/tmp/celerybeat-schedule"
          env:
            - name: DJANGO_TIME_ZONE
              value: {{ .Values.django.timeZone }}
            - name: DJANGO_SECRET_KEY
              value: {{ .Values.django.secretKey }}
            - name: DJANGO_ALLOWED_HOSTS
              value: {{ .Values.django.allowedHosts }}
            - name: DJANGO_DEBUG
              value: "{{ .Values.django.debug }}"
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: host
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: dbname
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: password
            - name: RABBITMQ_HOST
              value: "geoquery-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-rabbitmq-default-user
                  key: username
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-rabbitmq-default-user
                  key: password
            - name: CELERY_BROKER_URL
              value: "amqp://$(RABBITMQ_USERNAME):$(RABBITMQ_PASSWORD)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)//"
            - name: OXIGRAPH_URL
              value: "http://subjects-oxigraph.{{ .Release.Namespace }}.svc.cluster.local:7878"
            - name: OXIGRAPH_TIMEOUT
              value: {{ .Values.oxigraph.timeout | quote }}
            - name: METADATA_REFRESH_WIKIDATA_INTERVAL
              value: {{ .Values.metadataRefresh.wikidataInterval | quote }}
            - name: METADATA_REFRESH_OSM_INTERVAL
              value: {{ .Values.metadataRefresh.osmInterval | quote }}
            - name: METADATA_REFRESH_STALE_HOURS
              value: {{ .Values.metadataRefresh.staleHours | quote }}
            - name: METADATA_REFRESH_MAX_FAILURES
              value: {{ .Values.metadataRefresh.maxFailures | quote }}
            - name: METADATA_REFRESH_POSTPASS_URL
              value: {{ .Values.metadataRefresh.postpassUrl | quote }}
            - name: METADATA_REFRESH_POSTPASS_TIMEOUT
              value: {{ .Values.metadataRefresh.postpassTimeout | quote }}
            - name: METADATA_REFRESH_POSTPASS_BBOX
              value: {{ .Values.metadataRefresh.postpassBbox | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
