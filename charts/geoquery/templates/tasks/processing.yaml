apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-worker
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.tasks.processing.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: geoquery-processing-worker
  template:
    metadata:
      labels:
        app: geoquery-processing-worker
    spec:
      terminationGracePeriodSeconds: 300
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: celery-worker
          image: {{ .Values.backend.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["/app/.venv/bin/celery"]
          args:
            - "-A"
            - "geoquery"
            - "worker"
            - "--loglevel=info"
            - "-Q"
            - "processing"
            - "--concurrency=1"
            - "--max-tasks-per-child=100"
          env:
            - name: CLIP_WARMUP_ENABLED
              value: "true"
            - name: DJANGO_TIME_ZONE
              value: {{ .Values.django.timeZone }}
            - name: DJANGO_SECRET_KEY
              value: {{ .Values.django.secretKey }}
            - name: DJANGO_ALLOWED_HOSTS
              value: {{ .Values.django.allowedHosts }}
            - name: DJANGO_DEBUG
              value: "{{ .Values.django.debug }}"
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: host
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: dbname
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: password
            - name: PROTOMAPS_API_KEY
              value: {{ .Values.protomaps.key }}
            - name: REDIS_HOST
              value: "geoquery-redis.{{ .Release.Namespace }}.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-redis-secret
                  key: password
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
          volumeMounts:
            - name: clip-cache
              mountPath: /app/models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: clip-cache
          persistentVolumeClaim:
            claimName: geoquery-clip-cache
        - name: tmp
          emptyDir: {}
