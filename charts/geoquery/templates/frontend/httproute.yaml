{{- if eq .Values.exposure.type "gateway" }}
{{- /* Route external traffic to the reverse proxy when enabled, otherwise
       fall back to the frontend service directly. */}}
{{- $service := ternary "geoquery-proxy" "geoquery" .Values.proxy.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-geoquery
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    {{- toYaml .Values.exposure.gateway.parentRefs | nindent 4 }}
  {{- if .Values.exposure.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.exposure.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $service }}
          port: 80
{{- end }}
