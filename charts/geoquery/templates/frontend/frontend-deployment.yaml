apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoquery-frontend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: geoquery-frontend
  template:
    metadata:
      labels:
        app: geoquery-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: django
          image: {{ .Values.frontend.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DJANGO_TIME_ZONE
              value: {{ .Values.django.timeZone }}
            - name: DJANGO_SECRET_KEY
              value: {{ .Values.django.secretKey }}
            - name: DJANGO_ALLOWED_HOSTS
              value: {{ .Values.django.allowedHosts }}
            - name: DJANGO_DEBUG
              value: "{{ .Values.django.debug }}"
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: host
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: dbname
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: password
            - name: PROTOMAPS_API_KEY
              value: {{.Values.protomaps.key }}
            - name: REDIS_HOST
              value: "geoquery-redis.{{ .Release.Namespace }}.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-redis-secret
                  key: password
            - name: CELERY_BROKER_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: CLIP_WARMUP_ENABLED
              value: "false"
            - name: DIRECTORIES_ENABLED
              value: "{{ .Values.geoquery.directories }}"
            {{- if .Values.metrics.enabled }}
            - name: PROMETHEUS_ENABLED
              value: "true"
            {{- end }}
          resources:
            requests:
              memory: "3500Mi"
              cpu: "500m"
            limits:
              memory: "4000Mi"
              cpu: "2000m"
          readinessProbe:
            httpGet:
              path: /health/ready/
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: 8000
            - name: metrics
              containerPort: 9090
      volumes:
        - name: tmp
          emptyDir: {}
