{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  podSelector:
    matchLabels:
      app: geoquery-frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from gateway/ingress controller based on exposure.type
    {{- if eq .Values.exposure.type "gateway" }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.exposure.gateway.networkPolicy.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.exposure.gateway.networkPolicy.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: 3000
    {{- else if eq .Values.exposure.type "ingress" }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.exposure.ingress.networkPolicy.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.exposure.ingress.networkPolicy.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: 3000
    {{- else if eq .Values.exposure.type "custom" }}
    {{- range .Values.exposure.custom.networkPolicy }}
    - from:
        - namespaceSelector:
            {{- toYaml .namespaceSelector | nindent 12 }}
          {{- if .podSelector }}
          podSelector:
            {{- toYaml .podSelector | nindent 12 }}
          {{- end }}
      ports:
        - protocol: TCP
          port: 3000
    {{- end }}
    {{- end }}
    {{- /* type "none" has no ingress rules - traffic is blocked */}}
    {{- if .Values.metrics.enabled }}
    # Allow Prometheus to scrape metrics
    - from:
        - namespaceSelector:
            {{- toYaml .Values.metrics.networkPolicy.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.metrics.networkPolicy.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: 9090
    {{- end }}
  # The frontend is a dumb UI - it initiates no outbound connections, so all
  # egress is denied.
  egress: []
{{- end }}
