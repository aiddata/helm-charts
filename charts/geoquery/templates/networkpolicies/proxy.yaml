{{- if and .Values.networkPolicies.enabled .Values.proxy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: proxy-network-policy
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
spec:
  podSelector:
    matchLabels:
      app: geoquery-proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the gateway/ingress controller based on exposure.type.
    # The proxy is the single external entry point, so it owns the exposure
    # source rules (the frontend/backend only accept traffic from the proxy).
    {{- if eq .Values.exposure.type "gateway" }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.exposure.gateway.networkPolicy.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.exposure.gateway.networkPolicy.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.proxy.containerPort }}
    {{- else if eq .Values.exposure.type "ingress" }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.exposure.ingress.networkPolicy.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.exposure.ingress.networkPolicy.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.proxy.containerPort }}
    {{- else if eq .Values.exposure.type "custom" }}
    {{- range .Values.exposure.custom.networkPolicy }}
    - from:
        - namespaceSelector:
            {{- toYaml .namespaceSelector | nindent 12 }}
          {{- if .podSelector }}
          podSelector:
            {{- toYaml .podSelector | nindent 12 }}
          {{- end }}
      ports:
        - protocol: TCP
          port: {{ $.Values.proxy.containerPort }}
    {{- end }}
    {{- end }}
    {{- /* type "none" has no ingress rules - traffic is blocked */}}
  egress:
    # Allow DNS resolution (needed to resolve the upstream service names)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.dns.namespace }}
          podSelector:
            {{- toYaml .Values.networkPolicies.dns.podSelector | nindent 12 }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow forwarding to the frontend pods
    - to:
        - podSelector:
            matchLabels:
              app: geoquery-frontend
      ports:
        - protocol: TCP
          port: 3000
    # Allow forwarding to the backend pods
    - to:
        - podSelector:
            matchLabels:
              app: geoquery-backend
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
