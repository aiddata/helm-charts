apiVersion: batch/v1
kind: Job
metadata:
  name: geoquery-db-migration
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 21600 # six hours
  template:
    metadata:
      labels:
        app: geoquery-db-migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      initContainers:
        - name: wait-for-db
          image: {{ .Values.backend.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - /app/.venv/bin/python
            - -c
            - |
              import os, time, psycopg
              dsn = "host={} port={} dbname={} user={} password={}".format(
                  os.environ["PG_HOST"], os.environ["PG_PORT"],
                  os.environ["PG_DBNAME"], os.environ["PG_USER"], os.environ["PG_PASSWORD"])
              for _ in range(60):
                  try:
                      psycopg.connect(dsn).close()
                      break
                  except Exception as e:
                      print("waiting for db:", e, flush=True)
                      time.sleep(5)
              else:
                  raise SystemExit("database not ready")
          env:
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: host
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: dbname
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: password
      containers:
        - name: django
          image: {{ .Values.backend.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            ["/app/.venv/bin/python", "manage.py", "migrate"]
          env:
            - name: DJANGO_SECRET_KEY
              value: {{ .Values.django.secretKey }}
            - name: DJANGO_ALLOWED_HOSTS
              value: {{ .Values.django.allowedHosts }}
            - name: DJANGO_DEBUG
              value: "{{ .Values.django.debug }}"
            - name: PG_HOST
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: host
            - name: PG_DBNAME
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: dbname
            - name: PG_PORT
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: port
            - name: PG_USER
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: username
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoquery-db-app
                  key: password
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
