{{- if .Values.metrics.enabled }}
{{- if .Capabilities.APIVersions.Has "monitoring.coreos.com/v1" }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: geoquery-db
  labels:
    app: geoquery
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: geoquery-db
  podMetricsEndpoints:
    - port: metrics
{{- end }}
{{- end }}
