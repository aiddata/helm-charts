frontend:
  image: ghcr.io/aiddata/geoquery-frontend:9fdf389
  replicaCount: 1

backend:
  image: ghcr.io/aiddata/geoquery-backend:9fdf389
  replicaCount: 1
  # import.runAsUser / import.runAsGroup: optional overrides for the pod
  # securityContext of the geoquery-import deployment (defaults to 1000/1000
  # if unset). Useful when the mounted NFS volumes require a specific UID/GID.
  import: {}

# Reverse proxy that fronts the app. It is the single service external
# traffic (see exposure below) is routed to, and it forwards each request to
# either the frontend (UI) or the backend (API/admin) based on the path.
proxy:
  enabled: true
  image: nginxinc/nginx-unprivileged:1.27-alpine
  replicaCount: 2
  # Port nginx listens on inside the container. Must be >1024 so the
  # non-root container can bind it.
  containerPort: 8080
  # Maximum request body size; lets large uploads/downloads stream through.
  maxBodySize: "100m"
  # Path prefixes routed to the backend service. Every request whose path
  # does not start with one of these is served by the frontend. Adjust to
  # match your app's URL layout — e.g. add "/static/" and "/media/" if the
  # backend serves the Django admin's assets.
  backendPaths:
    - /admin/
    - /api/
    - /data/
    - /static/
    - /stats/
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi

# Exposure configuration (how the app is exposed externally)
# type: "none" | "ingress" | "gateway" | "custom"
#   - none: No ingress resources created, no external traffic allowed
#   - ingress: Traditional Kubernetes Ingress resource
#   - gateway: Gateway API HTTPRoute resource
#   - custom: No resources created, but allows traffic from custom sources (bring your own ingress/gateway)
exposure:
  type: none

  # Traditional Kubernetes Ingress configuration (used when type: ingress)
  ingress:
    className: "" # e.g., "nginx", "traefik"
    annotations: {}
      # cert-manager.io/cluster-issuer: letsencrypt-prod
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: geoquery.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []
    #  - secretName: geoquery-tls
    #    hosts:
    #      - geoquery.example.com
    # Network policy: which pods can send traffic to the frontend
    networkPolicy:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
      podSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx

  # Gateway API configuration (used when type: gateway)
  gateway:
    # Reference to an existing Gateway resource
    parentRefs:
      - name: eg
        namespace: envoy-gateway-system
    hostnames:
      - geoquery.example.com
    # Network policy: which pods can send traffic to the frontend
    networkPolicy:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: envoy-gateway-system
      podSelector:
        matchLabels:
          gateway.envoyproxy.io/owning-gateway-name: eg

  # Custom configuration (used when type: custom)
  # Use this when you manage your own Ingress/Gateway resources outside this chart
  custom:
    # Network policy peers that should be allowed to reach the frontend
    networkPolicy: []
    # - namespaceSelector:
    #     matchLabels:
    #       custom-label: value
    #   podSelector:
    #     matchLabels:
    #       app: custom-proxy

# Network Policies for securing pod-to-pod and external communication
networkPolicies:
  enabled: false

  # External API egress configuration
  externalEgress:
    # If true, allows all external egress (0.0.0.0/0)
    # If false, only allows egress to specified CIDRs
    allowAll: true
    # Specific CIDRs to allow when allowAll is false
    # cidrs:
    #   - cidr: 0.0.0.0/0
    #     ports:
    #       - port: 443
    #         protocol: TCP

  # Kubernetes API server endpoint (needed by CNPG pods to query cluster resources)
  # Use the actual API server endpoint IP, not the kubernetes ClusterIP —
  # NetworkPolicy ipBlock rules are evaluated after DNAT, so the ClusterIP
  # (e.g. 10.43.0.1) won't match. Find it with: kubectl get endpoints kubernetes -n default
  kubeApiServer:
    cidr: "172.30.0.11/32"
    port: 6443

  # DNS egress (required for all pods to resolve service names)
  dns:
    # Namespace where CoreDNS/kube-dns runs
    namespace: kube-system
    # Labels to select DNS pods
    podSelector:
      matchLabels:
        k8s-app: kube-dns

  # Namespace where the CNPG operator is installed
  cnpgOperator:
    namespace: cnpg-system

  # Namespace where the RabbitMQ cluster operator is installed
  rabbitmqOperator:
    namespace: rabbitmq-system

tasks:
  background:
    replicaCount: 3
  processing:
    replicaCount: 3
  beat:
    enabled: true

rabbitmq:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

django:
  timeZone: "UTC"
  secretKey: <DJANGO SECRET KEY>
  emailPassword: <EMAIL PASSWORD>
  debug: "false"
  allowedHosts: <ALLOWED HOSTS>
  # Comma-separated origins Django trusts for unsafe (POST) requests behind the
  # TLS-terminating proxy (Cloudflare Tunnel). Each must include the scheme,
  # e.g. "https://geoquery.org". Required for admin login POSTs. Empty disables.
  csrfTrustedOrigins: ""
  # Public base URL of the deployment, including scheme (no trailing slash).
  # Used by the backend to build absolute links (e.g. result downloads and
  # links back to the frontend). Populates DOWNLOAD_BASE_URL and
  # FRONTEND_BASE_URL.
  baseUrl: "https://geoquery.org"

geoquery:
  directories: "false"

# Shared NFS-backed volumes mounted by pods across the chart
volumes:
  # geoquery-data: read-only NFS pool of source datasets
  data:
    storageClassName: nfs-csi
    size: 100Gi
    # NFS server hostname/address and the exported share path
    server: 128.239.59.130
    share: <SHARE PATH>
    # Optional sub-directory under the share to mount (empty = share root)
    subDir: ""
    mountOptions:
      - hard
      - nfsvers=4.1
  # geoquery-requests: read-write NFS pool for generated query results
  requests:
    storageClassName: nfs-csi
    size: 100Gi
    server: 128.239.59.130
    share: <SHARE PATH>
    subDir: ""
    mountOptions:
      - hard
      - nfsvers=4.1

database:
  replicas: 3
  storage:
    storageClass: nfs-csi
    size: 50Gi
  backup:
    enabled: false
    schedule: "0 0 0,12 * * *"
    retentionPolicy: "30d"
    objectStoreName: my-backup-store
    s3Credentials:
      destinationPath: s3://backup-bucket-name
      endpointUrl: https://s3.zone.example.com
      accessKeyId:
        name: cnpg-backup
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-backup
        key: SECRET_ACCESS_KEY
  recover:
    enabled: false
    objectStoreName: my-recover-store
    s3Credentials:
      destinationPath: s3://recover-bucket-name
      endpointUrl: https://s3.zone.example.com
      accessKeyId:
        name: cnpg-recover
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: cnpg-recover
        key: SECRET_ACCESS_KEY

protomaps:
  key: MY_PROTOMAPS_KEY

# Prometheus metrics configuration
metrics:
  enabled: false
  path: "/metrics"

  # PodMonitor resources. Requires the Prometheus Operator CRDs
  # (monitoring.coreos.com) to be installed, and the master metrics.enabled
  # switch above to be true. When enabled:
  #   - a PodMonitor is created for the backend pods so Prometheus scrapes
  #     the django-prometheus endpoint on the dedicated metrics port (9091)
  #   - a PodMonitor is created for the database cluster so Prometheus can
  #     scrape the PostgreSQL metrics endpoint (port 9187)
  podMonitor:
    enabled: true
    interval: "30s"
    scrapeTimeout: "10s"
    labels: {}

  grafanaDashboard:
    title: "Yesterdays"

  networkPolicy:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: monitoring
    podSelector:
      matchLabels:
        app.kubernetes.io/name: prometheus

  prometheusRule:
    enabled: false # Enable when you want alerting
    namespace: ""
    labels: {}
